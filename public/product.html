<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | ARVYN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">

  <style>
    .product-page {
      padding: 120px 8%;
    }

    .product-layout {
      display: flex;
      gap: 60px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .product-image img {
      width: 400px;
      border-radius: 15px;
    }

    .thumbs {
      margin-top: 15px;
    }

    .thumbs img {
      width: 80px;
      margin-right: 10px;
      cursor: pointer;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .thumbs img:hover {
      border-color: crimson;
    }

    .product-info {
      max-width: 500px;
    }

    .product-desc {
      margin: 20px 0;
      color: #bbb;
    }

    .sizes button {
      margin-right: 10px;
      padding: 8px 18px;
      border: 1px solid #444;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .sizes button.active {
      background: crimson;
      border-color: crimson;
    }

    .add-btn {
      margin-top: 25px;
      padding: 12px 30px;
      background: crimson;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 30px;
      font-weight: 600;
    }
  </style>

</head>
<body>

<nav class="navbar">
  <div class="logo">ARVYN</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </div>
</nav>

<section class="product-page">
  <div id="productDetails"></div>
</section>

<script src="js/cart.js"></script>

<script>
async function loadProduct() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const res = await fetch("/api/products");
  const products = await res.json();

  const product = products.find(p => p._id === id);

  const container = document.getElementById("productDetails");

  if (!product) {
    container.innerHTML = "<h2>Product Not Found</h2>";
    return;
  }

  const images = product.images && product.images.length 
                  ? product.images 
                  : [product.image];

  container.innerHTML = `
    <div class="product-layout">

      <div class="product-image">
        <img id="mainImage" src="${images[0]}">
        <div class="thumbs">
          ${images.map(img => `
            <img src="${img}" onclick="changeImage('${img}')">
          `).join("")}
        </div>
      </div>

      <div class="product-info">

        <h1>${product.name}</h1>
        <h2>₹${product.price}</h2>

        <p class="product-desc">
          Premium ARVYN oversized tee. 
          240 GSM cotton. Dark aesthetic drop.
        </p>

        <div class="size-section">
          <h4>Select Size:</h4>
          <div class="sizes">
            <button onclick="selectSize(this)">S</button>
            <button onclick="selectSize(this)">M</button>
            <button onclick="selectSize(this)">L</button>
            <button onclick="selectSize(this)">XL</button>
            <button onclick="selectSize(this)">XXL</button>
            <button onclick="selectSize(this)">XXXL</button>
          </div>
        </div>

        <button 
          class="add-btn"
          onclick="addProductToCart('${product._id}', '${product.name}', ${product.price}, '${images[0]}')">
          Add to Cart
        </button>

      </div>

    </div>
  `;
}

function changeImage(src) {
  document.getElementById("mainImage").src = src;
}

let selectedSize = null;

function selectSize(btn) {
  document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedSize = btn.innerText;
}

function addProductToCart(id, name, price, image) {

  if (!selectedSize) {
    alert("Please select a size");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => 
      item._id === id && item.size === selectedSize
  );

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      _id: id,
      name,
      price,
      image,
      size: selectedSize,
      qty: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to Cart");
}

document.addEventListener("DOMContentLoaded", loadProduct);
</script>

</body>
</html>
